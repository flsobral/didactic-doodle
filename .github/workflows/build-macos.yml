name: build-macos
on: [push, pull_request]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install sdl3 libpng
      - name: Fetch pinned Skia
        run: ./scripts/fetch-totalcross-skia.sh "$PWD/.cache/skia-158dc9d7" macos-arm64
      - name: Configure and build
        run: cmake -S . -B build -DTC_BACKEND=SDL -DTC_RENDERER=SKIA -DTC_GRAPHICS=CPU -DTC_SKIA_ROOT="$PWD/.cache/skia-158dc9d7" && cmake --build build --config Release
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with: { name: macos-build-logs, path: build/CMakeFiles }
