name: build-ios
on: [push, pull_request]
jobs:
  layout:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify native iOS composition sources
        run: |
          test -f board/backends/ios/board_ios_backend.mm
          test -f magic/backends/metal/magic_metal_context.mm
          test -f examples/ios/magic_doodle_board_ios_demo.mm
