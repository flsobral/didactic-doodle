name: build-windows
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SDL3
        shell: pwsh
        run: vcpkg install sdl3:x64-windows zlib-ng:x64-windows-static libpng:x64-windows-static
      - name: Fetch pinned native dependencies
        shell: bash
        run: |
          ./scripts/fetch-totalcross-skia.sh "$PWD/.cache/skia-158dc9d7-r5" windows-x64
          test -f "$PWD/.cache/skia-158dc9d7-r5/headers/modules/skia/include/core/SkCanvas.h"
          test -f "$PWD/.cache/skia-158dc9d7-r5/libskia-windows-x64.lib"
      - name: Configure and build
        shell: pwsh
        run: cmake -S . -B build -DBOARD_BACKEND=SDL3 -DMAGIC_BACKEND=CPU -DDOODLE_RENDERER=SKIA -DDOODLE_SKIA_ROOT="$env:GITHUB_WORKSPACE/.cache/skia-158dc9d7-r5" -DMDB_BUILD_EXAMPLES=ON -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded -DCMAKE_PREFIX_PATH="$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows-static" -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"; cmake --build build --config Release
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with: { name: windows-build-logs, path: build/CMakeFiles }
