name: build-web
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Emscripten 2.0.6
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 2.0.6
      - name: Fetch pinned wasm32 Skia
        run: ./scripts/fetch-totalcross-skia.sh "$PWD/.cache/skia-wasm32-r4" wasm32
      - name: Configure and build
        run: |
          emcmake cmake -S . -B build-web -DCMAKE_BUILD_TYPE=Release -DBOARD_BACKEND=WEB -DMAGIC_BACKEND=WEB -DDOODLE_RENDERER=SKIA -DDOODLE_SKIA_ROOT="$PWD/.cache/skia-wasm32-r4" -DMDB_BUILD_TESTS=OFF -DMDB_BUILD_EXAMPLES=ON
          cmake --build build-web --config Release
          test -f build-web/examples/web/magic_doodle_board_web_demo.html
          test -f build-web/examples/web/magic_doodle_board_web_demo.js
          test -f build-web/examples/web/magic_doodle_board_web_demo.wasm
          test -f build-web/examples/web/magic_doodle_board_web_demo.data
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with: { name: web-build-logs, path: build-web/CMakeFiles }
